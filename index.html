<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      transition: 0.3s;
    }

    header {
      background: #0077ff;
      color: white;
      padding: 30px;
      text-align: center;
    }

    nav {
      background: #005fcc;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    button {
      background: #0077ff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #005fcc;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    /* Dark mode */
    .dark {
      background: #111;
      color: white;
    }

    .dark .card {
      background: #222;
    }

    .dark nav {
      background: #111;
    }

    .dark header {
      background: #000;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to My Website</h1>
  <p>This is my upgraded site 🚀</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <h2>About Me</h2>
    <p>Hello! I’m learning web development and building my first website.</p>
    <img src="https://picsum.photos/800/300">
  </div>

  <div class="card">
    <h2>My Goal</h2>
    <p>I want to become a great developer and build awesome projects.</p>
    <button onclick="alert('Keep going! 🚀')">Click Me</button>
  </div>

  <div class="card">
    <h2>Extra Feature</h2>
    <p>Try switching between light and dark mode:</p>
    <button onclick="toggleDarkMode()">Toggle Dark Mode 🌙</button>
  </div>

</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

<script>
function toggleDarkMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
