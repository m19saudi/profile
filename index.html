<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #111;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    nav a {
      margin: 0 20px;
      text-decoration: none;
      color: #111;
      font-weight: 500;
    }

    section {
      padding: 100px 20px;
      text-align: center;
    }

    .hero {
      font-size: 48px;
      font-weight: 600;
    }

    .sub {
      font-size: 20px;
      color: #555;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    .light {
      background: #f5f5f7;
    }

    img {
      width: 80%;
      max-width: 800px;
      margin-top: 30px;
      border-radius: 20px;
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #777;
    }
  </style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<section id="home">
  <div class="hero">Welcome to My Website</div>
  <div class="sub">Simple. Clean. Powerful.</div>
  <button class="btn" onclick="scrollToSection('about')">Learn more</button>

  <img src="https://picsum.photos/1000/500">
</section>

<section id="about" class="light">
  <div class="hero">About Me</div>
  <div class="sub">
    I build modern, clean, and user-friendly websites inspired by Apple design.
  </div>
</section>

<section>
  <div class="hero">My Vision</div>
  <div class="sub">
    Create simple experiences that feel powerful and beautiful.
  </div>

  <img src="https://picsum.photos/900/400">
</section>

<section id="contact" class="light">
  <div class="hero">Contact</div>

  <form action="https://formsubmit.co/YOUR-EMAIL-HERE" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br><br>
    <input type="email" name="email" placeholder="Your Email" required><br><br>
    <textarea name="message" placeholder="Your Message"></textarea><br><br>
    <button class="btn" type="submit">Send</button>
  </form>
</section>

<footer>
  © 2026 My Portfolio
</footer>

<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
